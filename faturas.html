<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faturas | MARG DRESS CODE</title>
    <link rel="stylesheet" href="style.css?v=2">
    <style>
        .btn-filtro-empresa {
            padding: 10px 20px; 
            background: #000; 
            color: #E1C158; 
            border: 2px solid transparent; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-filtro-empresa.ativo {
            border-color: #0d2bd7;
            background: white;
            box-shadow: 0 0 12px rgba(225, 193, 88, 0.5); 
            transform: scale(1.05); 
        }
        
        .logo-empresa-cliente.ativo {
            border: 2px solid #0d2bd7 !important;
            transform: scale(1.05);
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(13, 43, 215, 0.3);
        }

        .filtro-imoveis-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin: -5px auto 20px auto;
            width: 95%;
            max-width: 1200px;
        }
        .btn-filtro-imovel {
            padding: 8px 18px;
            background: #141414;
            color: #888;
            border: 1px solid #444;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        .btn-filtro-imovel:hover {
            color: #fff;
            border-color: #E1C158;
        }
        .btn-filtro-imovel.ativo {
            background: #E1C158;
            color: #000;
            border-color: #E1C158;
            box-shadow: 0 0 10px rgba(225, 193, 88, 0.4); 
        }

        /* ESTILOS DO CARROSSEL HORIZONTAL PADRONIZADO COM OS CARDS EXISTENTES */
        .faturas-container-horizontal {
            display: flex; gap: 15px; overflow-x: auto; padding: 10px 10px 20px 10px;
            width: 95%; max-width: 1200px; margin: 10px auto 30px auto;
            scrollbar-width: thin; scrollbar-color: #E1C158 transparent;
        }
        .faturas-container-horizontal::-webkit-scrollbar { height: 8px; }
        .faturas-container-horizontal::-webkit-scrollbar-track { background: transparent; }
        .faturas-container-horizontal::-webkit-scrollbar-thumb { background: #E1C158; border-radius: 4px; }

        .faturas-container-horizontal .card-fatura {
            min-width: 280px;
            flex-shrink: 0;
            margin: 0; 
        }
    </style>
</head>
<body style="background: #f4f6f8;">

    <div class="top-bar">
        <div class="brand">
            <img src="./img/mylogoR.png" onclick="window.location.href='menu.html'" alt="Logo Rogério">
        </div>
        <div class="page-title">
            <h1>Faturas</h1>
            <p>MARG DRESS CODE</p>
        </div>
    </div>

    <div class="seletor-empresas">
        <button id="btn-todas" onclick="selecionarEmpresa('todas')" class="btn-filtro-empresa ativo">Ver Todas</button>
        <img id="img-aguas" src="./img/aguasdopara-logo.png" onclick="selecionarEmpresa('aguas do para')" class="logo-empresa-cliente" alt="Águas do Pará">
        <img id="img-equatorial" src="./img/equatorial-logo.png" onclick="selecionarEmpresa('equatorial')" class="logo-empresa-cliente" alt="Equatorial">
        <img id="img-serena" src="./img/serena-logo.png" onclick="selecionarEmpresa('serena')" class="logo-empresa-cliente" alt="Serena">
        <img id="img-clariai" src="./img/clariai-logo.png" onclick="selecionarEmpresa('clariai')" class="logo-empresa-cliente" alt="Clariai">
        <img id="img-sense" src="./img/sense-logo.png" onclick="selecionarEmpresa('senseboard')" class="logo-empresa-cliente" alt="Sense">
    </div>

    <div id="filtroImoveisContainer" class="filtro-imoveis-container"></div>

    <div class="faturas-topo-info" style="display: flex; flex-direction: column; align-items: center; text-align: center;">
        <h1>Faturas em aberto</h1>
        <p id="resumo" class="resumo">Carregando dados da planilha...</p>

        <div id="cardMesAtual" style="margin-top: 20px; margin-bottom: 10px; padding: 15px 30px; background: #111; border-radius: 12px; border-bottom: 4px solid #E1C158; display: inline-block; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
            <span style="color: #E1C158; font-weight: bold; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">⚠️ Vencimentos deste Mês</span>
            <h2 id="valorMesAtual" style="color: #fff; margin: 5px 0; font-size: 2.2rem;">R$ 0,00</h2>
            <p id="textoMesAtual" style="color: #ccc; font-size: 0.9rem; margin: 0;">Calculando...</p>
        </div>
    </div>

    <div class="faturas-container-horizontal" id="carrosselFaturas"></div>

    <div class="cards-container" id="cards"></div>

    <div id="areaHistorico" class="historico-container">
        <div class="historico-header">
            <h2>Histórico de Pagamentos</h2>
            <select id="filtroAno" onchange="aplicarFiltros()" style="padding: 10px; border-radius: 8px;">
                <option value="todos">Todos os Anos</option>
                <option value="2026">2026</option>
                <option value="2025">2025</option>
            </select>
        </div>
        <div class="tabela-responsiva">
            <table class="tabela-historico">
                <thead>
                    <tr><th>Referência</th><th>Vencimento</th><th>Pagamento</th><th>Status</th><th>Valor</th></tr>
                </thead>
                <tbody id="corpoTabelaHistorico"></tbody>
            </table>
        </div>
        <div style="text-align: right; margin-top: 20px; font-size: 1.2rem;">
            <span id="qtdHistorico" style="font-size: 1rem; color: #666; margin-right: 15px;">0 faturas pagas</span>
            Total acumulado: <span id="totalHistorico" style="font-weight: bold; color: #0d2bd7;">R$ 0,00</span>
        </div>
    </div>

    <footer class="footer-brand" style="color: #666;">
        ROGÉRIO ESTUMANO | <b>DATA SCIENCE & TECH</b> © 2026
    </footer>

    <script>
        const LINK_FATURAS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3m4D-2Bb4EKd45LuhlBVm3gNqkXidt0KakEdSoX3DTVIRvZ2v9l72x94fOyXu440YDmkZt7y23VGc/pub?gid=1746813884&single=true&output=csv"; 
        
        let faturasDB = [];
        let empresaSelecionada = 'todas';
        let imovelSelecionado = 'todos'; 

        window.onload = () => { carregarDados(); };

        async function carregarDados() {
            try {
                const resposta = await fetch(LINK_FATURAS + `&t=${new Date().getTime()}`);
                const csv = await resposta.text();
                faturasDB = converterCsvParaJson(csv);
                
                renderizarFiltroImoveis();
                aplicarFiltros();
            } catch (erro) {
                console.error(erro);
                document.getElementById("resumo").innerHTML = "Erro ao carregar dados. Verifique a planilha.";
            }
        }

        function converterCsvParaJson(csv) {
            if (!csv) return [];
            const linhas = csv.split('\n');
            const cabecalhos = linhas[0].split(',').map(h => {
                let limpo = h.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '');
                if(limpo === 'codigopix') return 'codigoPix';
                if(limpo === 'codigoboleto') return 'codigoBoleto';
                if(limpo === 'datapagamento') return 'dataPagamento';
                return limpo; 
            });
            
            return linhas.slice(1).filter(l => l.trim() !== "").map(linha => {
                const colunas = linha.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/"/g, ''));
                let obj = {};
                cabecalhos.forEach((h, i) => {
                    let val = colunas[i];
                    if (h === 'valor') {
                        if (val) {
                            if (val.includes(',')) {
                                val = val.replace(/\./g, ''); val = val.replace(',', '.');  
                            } 
                            obj[h] = parseFloat(val) || 0;
                        } else { obj[h] = 0; }
                    } else { obj[h] = val; }
                });
                return obj;
            });
        }

        function selecionarEmpresa(nome) {
            empresaSelecionada = nome;
            
            document.getElementById("btn-todas").classList.remove("ativo");
            document.querySelectorAll(".logo-empresa-cliente").forEach(el => el.classList.remove("ativo"));
            
            if(nome === 'todas') {
                document.getElementById("btn-todas").classList.add("ativo");
            } else {
                const imgId = "img-" + nome;
                if(document.getElementById(imgId)) document.getElementById(imgId).classList.add("ativo");
            }
            
            renderizarFiltroImoveis();
            aplicarFiltros();
        }

        function renderizarFiltroImoveis() {
            const containerFiltro = document.getElementById("filtroImoveisContainer");
            
            let faturasEmpresa = faturasDB;
            if (empresaSelecionada !== 'todas') {
                faturasEmpresa = faturasDB.filter(f => f.empresa && f.empresa.toLowerCase() === empresaSelecionada.toLowerCase());
            }
            
            const imoveisUnicos = [...new Set(faturasEmpresa.map(f => f.imovel || 'Não Informado'))].filter(i => i !== 'Não Informado');
            
            imovelSelecionado = 'todos';
            
            let botoesHTML = `<button id="btn-imovel-todos" class="btn-filtro-imovel ativo" onclick="selecionarImovel('todos')">Todos os Imóveis</button>`;
            
            imoveisUnicos.forEach(imovel => {
                const idBtn = "btn-imovel-" + imovel.replace(/\s+/g, '-').toLowerCase();
                botoesHTML += `<button id="${idBtn}" class="btn-filtro-imovel" onclick="selecionarImovel('${imovel}')">${imovel}</button>`;
            });
            
            containerFiltro.innerHTML = botoesHTML;
        }

        function selecionarImovel(nome) {
            imovelSelecionado = nome;
            
            document.querySelectorAll(".btn-filtro-imovel").forEach(el => el.classList.remove("ativo"));
            const idBusca = nome === 'todos' ? 'btn-imovel-todos' : "btn-imovel-" + nome.replace(/\s+/g, '-').toLowerCase();
            const btn = document.getElementById(idBusca);
            if(btn) btn.classList.add("ativo");
            
            aplicarFiltros();
        }

        function converterDataBR(dataStr) {
            if(!dataStr) return new Date(9999, 11, 31);
            if(dataStr.includes('-')) {
                const [ano, mes, dia] = dataStr.split('-');
                return new Date(ano, mes - 1, dia);
            }
            const partes = dataStr.split('/');
            if(partes.length === 3) return new Date(partes[2], partes[1] - 1, partes[0]);
            return new Date(dataStr);
        }

        function formatarDataExibicao(dataStr) {
            if(!dataStr) return '-';
            if(dataStr.includes('-')) {
                const partes = dataStr.split('-');
                if(partes.length === 3) return `${partes[2]}/${partes[1]}/${partes[0]}`;
            }
            return dataStr;
        }

        function aplicarFiltros() {
            const ano = document.getElementById("filtroAno").value;
            let abertas = faturasDB.filter(f => f.status && f.status.toLowerCase() === 'aberto');
            let pagas = faturasDB.filter(f => f.status && f.status.toLowerCase() === 'pago');

            if (empresaSelecionada !== 'todas') {
                abertas = abertas.filter(f => f.empresa && f.empresa.toLowerCase() === empresaSelecionada.toLowerCase());
                pagas = pagas.filter(f => f.empresa && f.empresa.toLowerCase() === empresaSelecionada.toLowerCase());
            }

            if (imovelSelecionado !== 'todos') {
                abertas = abertas.filter(f => f.imovel && f.imovel === imovelSelecionado);
                pagas = pagas.filter(f => f.imovel && f.imovel === imovelSelecionado);
            }

            if (ano !== 'todos') {
                pagas = pagas.filter(h => h.dataPagamento && h.dataPagamento.includes(ano));
            }

            abertas.sort((a, b) => converterDataBR(a.vencimento) - converterDataBR(b.vencimento));
            
            // Passa a quantidade de faturas pagas para renderizarFaturas atualizar o texto superior
            renderizarFaturas(abertas, pagas.length);
            renderizarHistorico(pagas);
        }

        // NOVO: A função agora recebe a quantidade de faturas pagas como parâmetro
        function renderizarFaturas(lista, qtdPagas) {
            const container = document.getElementById("cards");
            container.innerHTML = lista.length ? "" : "<p style='color:#333; width: 100%; text-align: center;'>Nenhuma fatura antiga em aberto.</p>";
            
            const total = lista.reduce((s, f) => s + f.valor, 0);
            const totalFormatado = total.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
            
            // Atualiza o resumo com a contagem de pagas
            document.getElementById("resumo").innerHTML = `Você possui <b>${lista.length} faturas abertas</b> (${totalFormatado}).`;
            
            const hoje = new Date();
            hoje.setHours(0,0,0,0);
            const mesAtual = hoje.getMonth();
            const anoAtual = hoje.getFullYear();
            const nomesMeses = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];

            const faturasMesAtual = lista.filter(f => {
                const dataVenc = converterDataBR(f.vencimento);
                return dataVenc.getMonth() === mesAtual && dataVenc.getFullYear() === anoAtual;
            });
            const totalMesAtual = faturasMesAtual.reduce((acc, curr) => acc + curr.valor, 0);

            const cardMes = document.getElementById('cardMesAtual');
            if(cardMes) {
                document.getElementById('valorMesAtual').innerText = totalMesAtual.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
                document.getElementById('textoMesAtual').innerText = `${faturasMesAtual.length} faturas vencem em ${nomesMeses[mesAtual]}/${anoAtual}`;

                if(faturasMesAtual.length === 0) {
                    cardMes.style.borderBottomColor = '#22c1a6';
                    document.getElementById('valorMesAtual').style.color = '#22c1a6';
                } else {
                    cardMes.style.borderBottomColor = '#E1C158';
                    document.getElementById('valorMesAtual').style.color = '#fff';
                }
            }

            const carrosselContainer = document.getElementById("carrosselFaturas");
            carrosselContainer.innerHTML = "";

            if(faturasMesAtual.length > 0) {
                faturasMesAtual.forEach(f => {
                    const dataVenc = converterDataBR(f.vencimento);
                    const isAtrasada = dataVenc < hoje;
                    const classeAtrasada = isAtrasada ? " atrasada" : "";
                    const tagAtrasada = isAtrasada ? " (ATRASADA)" : "";
                    
                    const corTema = isAtrasada ? "#ff4d4d" : "#0d2bd7";
                    let tituloMes = (f.mes || "").toUpperCase();
                    
                    if (f.vencimento) {
                        let anoFatura = dataVenc.getFullYear();
                        let mesVencimento = dataVenc.getMonth();
                        if ((tituloMes.includes("DEZEMBRO") || tituloMes.includes("NOVEMBRO")) && mesVencimento <= 1) {
                            anoFatura -= 1; 
                        }
                        const jaTemAno = /\d/.test(tituloMes); 
                        if (!jaTemAno) {
                            tituloMes = `${tituloMes} ${anoFatura}`;
                        }
                    }

                    const nomeImovel = f.imovel ? f.imovel.toUpperCase() : "GERAL";
                    const nomeEmpresa = f.empresa ? f.empresa.toUpperCase() : "N/A";
                    const temPix = f.codigoPix && f.codigoPix.trim() !== "";
                    const temBoleto = f.codigoBoleto && f.codigoBoleto.trim() !== "";

                    const btnPixHTML = temPix 
                        ? `<button class="btn-pagar" style="background: ${corTema}; color: #fff; cursor: pointer; border: none;" onclick="copiar('${f.codigoPix}')">PIX</button>`
                        : `<button class="btn-pagar" style="background: #e0e0e0; color: #999; cursor: not-allowed; border: none;" disabled>PIX</button>`;

                    const btnBoletoHTML = temBoleto 
                        ? `<button class="btn-pagar" style="background: ${corTema}; color: #fff; border: none; cursor: pointer;" onclick="copiar('${f.codigoBoleto}')">BOLETO</button>`
                        : `<button class="btn-pagar" style="background: #f4f6f8; color: #999; border: 1px solid #ccc; cursor: not-allowed;" disabled>BOLETO</button>`;

                    carrosselContainer.innerHTML += `
                    <div class="card-fatura">
                        <div class="card-fatura-header${classeAtrasada}">
                            <div style="display: flex; align-items: center; justify-content: center; gap: 5px; flex-wrap: wrap;">
                                <span>${tituloMes}${tagAtrasada}</span>
                                <span style='background: #E1C158; color: #000; padding: 3px 8px; border-radius: 4px; font-size: 0.65rem; margin-left: 5px; vertical-align: middle; font-weight: bold;'>ESTE MÊS</span>
                            </div>
                            <div style="font-size: 0.75rem; font-weight: normal; margin-top: 5px; opacity: 0.9; letter-spacing: 1px;">📍 ${nomeImovel} [${nomeEmpresa}]</div>
                        </div>
                        <div class="card-fatura-body">
                            <div class="card-fatura-valor" style="color: ${corTema};">${f.valor.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}</div>
                            <div class="card-fatura-info">Vencimento: ${formatarDataExibicao(f.vencimento)}</div>
                            <div class="pix-box" style="border-color: ${corTema};">
                                ${btnPixHTML}
                                ${btnBoletoHTML}
                            </div>
                        </div>
                    </div>`;
                });
            } else {
                carrosselContainer.innerHTML = "<p style='color:#666; width: 100%; text-align: center; font-style: italic;'>Nenhuma fatura pendente neste mês.</p>";
            }
            
            lista.forEach(f => {
                const dataVenc = converterDataBR(f.vencimento);
                const isAtrasada = dataVenc < hoje;
                const isEsteMes = dataVenc.getMonth() === mesAtual && dataVenc.getFullYear() === anoAtual;

                const classeAtrasada = isAtrasada ? " atrasada" : "";
                const tagAtrasada = isAtrasada ? " (ATRASADA)" : "";
                const tagEsteMes = (isEsteMes && !isAtrasada) ? " <span style='background: #E1C158; color: #000; padding: 3px 8px; border-radius: 4px; font-size: 0.65rem; margin-left: 5px; vertical-align: middle; font-weight: bold;'>ESTE MÊS</span>" : "";
                
                const corTema = isAtrasada ? "#ff4d4d" : "#0d2bd7";
                let tituloMes = (f.mes || "").toUpperCase();
                
                if (f.vencimento) {
                    let anoFatura = dataVenc.getFullYear();
                    let mesVencimento = dataVenc.getMonth();
                    if ((tituloMes.includes("DEZEMBRO") || tituloMes.includes("NOVEMBRO")) && mesVencimento <= 1) {
                        anoFatura -= 1; 
                    }
                    const jaTemAno = /\d/.test(tituloMes); 
                    if (!jaTemAno) {
                        tituloMes = `${tituloMes} ${anoFatura}`;
                    }
                }

                const nomeImovel = f.imovel ? f.imovel.toUpperCase() : "GERAL";
                const nomeEmpresa = f.empresa ? f.empresa.toUpperCase() : "N/A";
                const temPix = f.codigoPix && f.codigoPix.trim() !== "";
                const temBoleto = f.codigoBoleto && f.codigoBoleto.trim() !== "";

                const btnPixHTML = temPix 
                    ? `<button class="btn-pagar" style="background: ${corTema}; color: #fff; cursor: pointer; border: none;" onclick="copiar('${f.codigoPix}')">PIX</button>`
                    : `<button class="btn-pagar" style="background: #e0e0e0; color: #999; cursor: not-allowed; border: none;" disabled>PIX</button>`;

                const btnBoletoHTML = temBoleto 
                    ? `<button class="btn-pagar" style="background: ${corTema}; color: #fff; border: none; cursor: pointer;" onclick="copiar('${f.codigoBoleto}')">BOLETO</button>`
                    : `<button class="btn-pagar" style="background: #f4f6f8; color: #999; border: 1px solid #ccc; cursor: not-allowed;" disabled>BOLETO</button>`;

                container.innerHTML += `
                <div class="card-fatura">
                    <div class="card-fatura-header${classeAtrasada}">
                        <div style="display: flex; align-items: center; justify-content: center; gap: 5px; flex-wrap: wrap;">
                            <span>${tituloMes}${tagAtrasada}</span>
                            ${tagEsteMes}
                        </div>
                        <div style="font-size: 0.75rem; font-weight: normal; margin-top: 5px; opacity: 0.9; letter-spacing: 1px;">📍 ${nomeImovel} [${nomeEmpresa}]</div>
                    </div>
                    <div class="card-fatura-body">
                        <div class="card-fatura-valor" style="color: ${corTema};">${f.valor.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}</div>
                        <div class="card-fatura-info">Vencimento: ${formatarDataExibicao(f.vencimento)}</div>
                        <div class="pix-box" style="border-color: ${corTema};">
                            ${btnPixHTML}
                            ${btnBoletoHTML}
                        </div>
                    </div>
                </div>`;
            });
        }

        function renderizarHistorico(lista) {
            const area = document.getElementById("areaHistorico");
            const corpo = document.getElementById("corpoTabelaHistorico");
            corpo.innerHTML = "";
            
            if (empresaSelecionada === 'todas' && imovelSelecionado === 'todos' && lista.length === 0) { 
                area.style.display = "none"; 
                return; 
            }
            area.style.display = "block";

            let total = 0;
            lista.forEach(h => {
                total += h.valor;
                const nomeImovel = h.imovel ? h.imovel : "Geral";
                
                corpo.innerHTML += `
                <tr>
                    <td>
                        <strong>${h.mes}</strong><br>
                        <small style="color:#888;">📍 ${nomeImovel}</small>
                    </td>
                    <td>${formatarDataExibicao(h.vencimento)}</td>
                    <td>${formatarDataExibicao(h.dataPagamento) || '-'}</td>
                    <td><span class="status-pago">Pago</span></td>
                    <td>${h.valor.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}</td>
                </tr>`;
            });
            
            // NOVO: Atualiza o texto da quantidade de faturas pagas e o total em dinheiro
            const textoQtd = lista.length === 1 ? '1 fatura paga' : `${lista.length} faturas pagas`;
            document.getElementById("qtdHistorico").innerText = textoQtd;
            document.getElementById("totalHistorico").innerText = total.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        }

        function copiar(c) { navigator.clipboard.writeText(c); alert("Código copiado com sucesso!"); }
    </script>
</body>
</html>
