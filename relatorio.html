<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despesas | MARG DRESS CODE</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        .multi-select-container {
            background: #0a0a0a;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px;
            max-height: 120px;
            overflow-y: auto;
            color: white;
            font-size: 0.8rem;
        }
        .multi-select-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; cursor: pointer; }
        .multi-select-item input { cursor: pointer; accent-color: #E1C158; }
        .select-all-divider { border-bottom: 1px solid #333; margin-bottom: 8px; padding-bottom: 5px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">
            <img src="./img/mylogoR.png" onclick="window.location.href='menu.html'" alt="Logo Rogério">
        </div>
        <div class="page-title">
            <h1>Relatório de Despesas</h1>
            <p>MARG DRESS CODE</p>
        </div>
    </div>

    <!-- BLOCO DE SALDOS -->
    <div class="report-summary" style="margin-bottom: 10px;">
        <div class="summary-item" style="border-left-color: #22c1a6;">
            <small>Saldo em Caixa</small>
            <h3 id="saldoCaixa">R$ 0,00</h3>
        </div>
        <div class="summary-item" style="border-left-color: #22c1a6;">
            <small>Saldo no Banco</small>
            <h3 id="saldoBanco">R$ 0,00</h3>
        </div>
        <div class="summary-item" style="border-left-color: #E1C158;">
            <small>Disponibilidade Atual</small>
            <h3 id="disponibilidadeTotal">R$ 0,00</h3>
        </div>
    </div>

    <!-- BLOCO DE PROJEÇÃO -->
    <div class="report-summary" style="margin-top: 0;">
        <div class="summary-item" style="border-left-color: #A67C00;">
            <small>Receitas no Período</small>
            <h3 id="receitasPeriodo" style="color: #22c1a6;">R$ 0,00</h3>
        </div>
        <div class="summary-item">
            <small>Despesas no Período</small>
            <h3 id="despesasPeriodo" class="valor-negativo">R$ 0,00</h3>
        </div>
        <div class="summary-item" id="cardProjecao" style="background: #1a1a1a;">
            <small>Projeção Final do Período</small>
            <h3 id="projecaoFinal">R$ 0,00</h3>
        </div>
    </div>

    <!-- PAINEL DE FILTROS -->
    <div class="filter-section" style="margin: 20px auto; background: #141414; border: 1px solid rgba(225, 193, 88, 0.2);">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <p style="font-size: 0.8rem; color: #E1C158; text-transform: uppercase; font-weight: bold; margin: 0;">Filtros de Análise Detalhada</p>
            <div>
                <button class="btn-acao" onclick="limparFiltros()" style="background: #E1C158; color: #000; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.75rem;">🧹 Limpar Filtros</button>
            </div>
        </div>
        
        <div class="filter-group" style="display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px;">
            <div style="flex: 1; display: flex; flex-direction: column; gap: 5px; min-width: 120px;">
                <label style="font-size: 0.75rem; color: #888;">Data Início (Semana)</label>
                <input type="date" id="dataInicio" onchange="onDataChange()" style="background: #0a0a0a; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 8px;">
            </div>
            <div style="flex: 1; display: flex; flex-direction: column; gap: 5px; min-width: 120px;">
                <label style="font-size: 0.75rem; color: #888;">Data Fim (Semana)</label>
                <input type="date" id="dataFim" onchange="onDataChange()" style="background: #0a0a0a; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 8px;">
            </div>
        </div>

        <div class="filter-group" style="display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px;">
            <div style="flex: 1; min-width: 150px;">
                <label style="font-size: 0.75rem; color: #888;">Anos</label>
                <div class="multi-select-container" id="containerAnos"></div>
            </div>
            <div style="flex: 1; min-width: 150px;">
                <label style="font-size: 0.75rem; color: #888;">Meses</label>
                <div class="multi-select-container" id="containerMeses"></div>
            </div>
        </div>

        <div class="filter-group" style="display: flex; flex-wrap: wrap; gap: 15px;">
            <div style="flex: 1; min-width: 150px;">
                <label style="font-size: 0.75rem; color: #888;">Macrogrupos</label>
                <div class="multi-select-container" id="containerMacrogrupo"></div>
            </div>
            <div style="flex: 1; min-width: 150px;">
                <label style="font-size: 0.75rem; color: #888;">Grupos</label>
                <div class="multi-select-container" id="containerGrupo"></div>
            </div>
            <div style="flex: 1; min-width: 150px;">
                <label style="font-size: 0.75rem; color: #888;">Categorias</label>
                <div class="multi-select-container" id="containerCategoria"></div>
            </div>
            <div style="flex: 1; min-width: 150px;">
                <label style="font-size: 0.75rem; color: #888;">Status</label>
                <div class="multi-select-container" id="containerStatus"></div>
            </div>
        </div>
    </div>

    <!-- CONTAINER DO GRÁFICO -->
    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; width: 95%; margin: 20px auto;">
        <div style="flex: 1; background: #141414; padding: 25px; border-radius: 15px; min-width: 300px; max-width: 500px; border: 1px solid rgba(225, 193, 88, 0.2);">
            <canvas id="graficoCategorias"></canvas>
        </div>
    </div>

    <div class="expense-list" id="listaDespesas" style="margin: 0 auto; padding-bottom: 40px;"></div>

    <div class="footer-brand">
        ROGÉRIO ESTUMANO | <b>DATA SCIENCE & TECH</b> © 2026
    </div>

    <script>
        const LINK_DESPESAS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3m4D-2Bb4EKd45LuhlBVm3gNqkXidt0KakEdSoX3DTVIRvZ2v9l72x94fOyXu440YDmkZt7y23VGc/pub?gid=0&single=true&output=csv";
        const LINK_SALDOS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3m4D-2Bb4EKd45LuhlBVm3gNqkXidt0KakEdSoX3DTVIRvZ2v9l72x94fOyXu440YDmkZt7y23VGc/pub?gid=1250042389&single=true&output=csv"; 
        const LINK_RECEITAS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3m4D-2Bb4EKd45LuhlBVm3gNqkXidt0KakEdSoX3DTVIRvZ2v9l72x94fOyXu440YDmkZt7y23VGc/pub?gid=458429059&single=true&output=csv";

        let despesasDB = [], receitasDB = [], saldosDB = { caixa: 0, banco: 0 };
        let meuGrafico;

        window.onload = () => {
            configurarSemanaAtual(new Date());
            inicializarMultiSelectTemporais();
            carregarDadosDaNuvem();
        };

        function configurarSemanaAtual(referencia) {
            const diaDaSemana = referencia.getDay();
            const domingo = new Date(referencia);
            domingo.setDate(referencia.getDate() - diaDaSemana);
            const sabado = new Date(referencia);
            sabado.setDate(referencia.getDate() + (6 - diaDaSemana));
            
            document.getElementById('dataInicio').value = domingo.toISOString().split('T')[0];
            document.getElementById('dataFim').value = sabado.toISOString().split('T')[0];
        }

        function inicializarMultiSelectTemporais() {
            const meses = ['01','02','03','04','05','06','07','08','09','10','11','12'];
            const nomesMeses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
            const containerM = document.getElementById('containerMeses');
            
            containerM.innerHTML = `<label class="multi-select-item select-all-divider"><input type="checkbox" onchange="toggleAll('mes', this.checked, true)"> <b>Selecionar Todos</b></label>`;
            meses.forEach((m, i) => {
                containerM.innerHTML += `<label class="multi-select-item"><input type="checkbox" class="filtro-mes" value="${m}" onchange="onTimeCheckboxChange()"> ${nomesMeses[i]}</label>`;
            });

            const anos = ['2024','2025','2026', '2027', '2028', '2029', '2030']; 
            const containerA = document.getElementById('containerAnos');
            
            containerA.innerHTML = `<label class="multi-select-item select-all-divider"><input type="checkbox" onchange="toggleAll('ano', this.checked, true)"> <b>Selecionar Todos</b></label>`;
            anos.forEach(a => {
                containerA.innerHTML += `<label class="multi-select-item"><input type="checkbox" class="filtro-ano" value="${a}" onchange="onTimeCheckboxChange()"> ${a}</label>`;
            });
        }

        function onDataChange() {
            document.querySelectorAll('.filtro-mes, .filtro-ano').forEach(cb => cb.checked = false);
            aplicarFiltros();
        }

        function onTimeCheckboxChange() {
            document.getElementById("dataInicio").value = "";
            document.getElementById("dataFim").value = "";
            aplicarFiltros();
        }

        function toggleAll(tipo, isChecked, isTimeFilter = false) {
            const checkboxes = document.querySelectorAll(`.filtro-${tipo}`);
            checkboxes.forEach(cb => cb.checked = isChecked);
            if (isTimeFilter) {
                document.getElementById("dataInicio").value = "";
                document.getElementById("dataFim").value = "";
            }
            aplicarFiltros();
        }

        function limparFiltros() {
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            configurarSemanaAtual(new Date());
            aplicarFiltros();
        }

        async function carregarDadosDaNuvem() {
            try {
                const cb = `&t=${new Date().getTime()}`;
                const [rDesp, rSal, rRec] = await Promise.all([
                    fetch(LINK_DESPESAS + cb).then(r => r.text()),
                    fetch(LINK_SALDOS + cb).then(r => r.text()).catch(() => ""),
                    fetch(LINK_RECEITAS + cb).then(r => r.text()).catch(() => "")
                ]);

                despesasDB = converterCsvParaJson(rDesp);
                receitasDB = converterCsvParaJson(rRec);
                
                const saldosData = converterCsvParaJson(rSal);
                saldosDB = { caixa: 0, banco: 0 };
                saldosData.forEach(s => {
                    const nomeConta = (s.conta || "").toLowerCase();
                    if (nomeConta.includes('caixa')) saldosDB.caixa = s.saldo;
                    if (nomeConta.includes('banco')) saldosDB.banco = s.saldo;
                });

                popularFiltrosDinamicosMultiSelect();
                aplicarFiltros();
            } catch (e) { console.error(e); }
        }

        // MOTOR DE LEITURA 2.0 (Inteligência para formatos PT-BR e US)
        function converterCsvParaJson(csv) {
            if (!csv) return [];
            const linhas = csv.split('\n');
            const cabecalhos = linhas[0].split(',').map(h => h.trim().toLowerCase().replace(/"/g, ''));
            
            return linhas.slice(1).filter(l => l.trim() !== "").map(linha => {
                const colunas = linha.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/"/g, ''));
                
                let obj = {};
                cabecalhos.forEach((h, i) => {
                    let val = colunas[i];
                    if (h === 'valor' || h === 'saldo') {
                        if (val) {
                            if (val.includes(',')) {
                                val = val.replace(/\./g, ''); 
                                val = val.replace(',', '.');  
                            } 
                            obj[h] = parseFloat(val) || 0;
                        } else {
                            obj[h] = 0;
                        }
                    } else {
                        obj[h] = val;
                    }
                });
                return obj;
            });
        }

        function popularFiltrosDinamicosMultiSelect() {
            const macros = [...new Set(despesasDB.map(d => d.macrogrupo))].filter(Boolean).sort();
            const grupos = [...new Set(despesasDB.map(d => d.grupo))].filter(Boolean).sort();
            const categorias = [...new Set(despesasDB.map(d => d.categoria))].filter(Boolean).sort();
            const statusDb = [...new Set(despesasDB.map(d => d.status))].filter(Boolean).sort();
            const statusLista = statusDb.length > 0 ? statusDb : ['Pago', 'Aguardando', 'Atrasado'];

            renderizarCaixaSelecao('containerMacrogrupo', macros, 'macrogrupo');
            renderizarCaixaSelecao('containerGrupo', grupos, 'grupo');
            renderizarCaixaSelecao('containerCategoria', categorias, 'categoria');
            renderizarCaixaSelecao('containerStatus', statusLista, 'status');
        }

        function renderizarCaixaSelecao(containerId, items, tipo) {
            const container = document.getElementById(containerId);
            container.innerHTML = `<label class="multi-select-item select-all-divider"><input type="checkbox" onchange="toggleAll('${tipo}', this.checked, false)"> <b>Selecionar Todos</b></label>`;
            items.forEach(item => {
                container.innerHTML += `<label class="multi-select-item"><input type="checkbox" class="filtro-${tipo}" value="${item}" onchange="aplicarFiltros()"> ${item}</label>`;
            });
        }

        function aplicarFiltros() {
            const dtInicio = document.getElementById("dataInicio").value;
            const dtFim = document.getElementById("dataFim").value;
            
            const mesesSel = Array.from(document.querySelectorAll('.filtro-mes:checked')).map(i => i.value);
            const anosSel = Array.from(document.querySelectorAll('.filtro-ano:checked')).map(i => i.value);
            const macroSel = Array.from(document.querySelectorAll('.filtro-macrogrupo:checked')).map(i => i.value);
            const grupoSel = Array.from(document.querySelectorAll('.filtro-grupo:checked')).map(i => i.value);
            const catSel = Array.from(document.querySelectorAll('.filtro-categoria:checked')).map(i => i.value);
            const statusSel = Array.from(document.querySelectorAll('.filtro-status:checked')).map(i => i.value);

            let filtradas = despesasDB.filter(d => {
                if (!d.data) return false;
                const [ano, mes] = d.data.split('-');
                let pCalendario = (!dtInicio || d.data >= dtInicio) && (!dtFim || d.data <= dtFim);
                let pAno = anosSel.length === 0 || anosSel.includes(ano);
                let pMes = mesesSel.length === 0 || mesesSel.includes(mes);
                let pMacro = macroSel.length === 0 || macroSel.includes(d.macrogrupo);
                let pGrupo = grupoSel.length === 0 || grupoSel.includes(d.grupo);
                let pCategoria = catSel.length === 0 || catSel.includes(d.categoria);
                let pStatus = statusSel.length === 0 || statusSel.includes(d.status);
                
                return pCalendario && pAno && pMes && pMacro && pGrupo && pCategoria && pStatus;
            });

            let recFiltradas = receitasDB.filter(r => {
                if (!r.data) return false;
                const [ano, mes] = r.data.split('-');
                let pCalendario = (!dtInicio || r.data >= dtInicio) && (!dtFim || r.data <= dtFim);
                let pAno = anosSel.length === 0 || anosSel.includes(ano);
                let pMes = mesesSel.length === 0 || mesesSel.includes(mes);
                return pCalendario && pAno && pMes;
            });

            renderizarCards(filtradas);
            calcularFinanceiro(filtradas, recFiltradas);
            atualizarGraficoRosca(filtradas);
        }

        function calcularFinanceiro(desp, rec) {
            const totalDespAberto = desp.reduce((s, d) => d.status !== 'Pago' ? s + d.valor : s, 0);
            const totalRec = rec.reduce((s, r) => s + r.valor, 0);
            const disp = saldosDB.caixa + saldosDB.banco;
            const projecao = disp + totalRec - totalDespAberto;

            document.getElementById("saldoCaixa").innerText = formatarMoeda(saldosDB.caixa);
            document.getElementById("saldoBanco").innerText = formatarMoeda(saldosDB.banco);
            document.getElementById("disponibilidadeTotal").innerText = formatarMoeda(disp);
            document.getElementById("receitasPeriodo").innerText = formatarMoeda(totalRec);
            document.getElementById("despesasPeriodo").innerText = formatarMoeda(totalDespAberto);
            document.getElementById("projecaoFinal").innerText = formatarMoeda(projecao);
            
            document.getElementById("cardProjecao").style.borderLeft = projecao < 0 ? "4px solid #000" : "4px solid #000";
            document.getElementById("projecaoFinal").style.color = projecao < 0 ? "#ff4d4d" : "#fff";
        }

        function atualizarGraficoRosca(lista) {
            const ctx = document.getElementById('graficoCategorias').getContext('2d');
            const totais = lista.reduce((acc, d) => { 
                const chave = d.grupo || 'Outros';
                acc[chave] = (acc[chave] || 0) + d.valor; 
                return acc; 
            }, {});
            const totalSoma = Object.values(totais).reduce((a, b) => a + b, 0);

            if (meuGrafico) meuGrafico.destroy();
            meuGrafico = new Chart(ctx, {
                type: 'doughnut',
                plugins: [ChartDataLabels],
                data: {
                    labels: Object.keys(totais),
                    datasets: [{
                        data: Object.values(totais),
                        backgroundColor: ['#E1C158', '#A67C00', '#444444', '#1A73E8', '#E8710A', '#8AB4F8'],
                        borderColor: '#141414',
                        borderWidth: 4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#fff' } },
                        datalabels: { 
                            color: '#fff', 
                            font: { weight: 'bold', size: 12 },
                            formatter: (v) => {
                                if (!v || totalSoma === 0) return null;
                                let perc = (v / totalSoma) * 100;
                                if (perc < 4) return null; 
                                return perc.toFixed(1) + "%";
                            }
                        }
                    },
                    cutout: '60%'
                }
            });
        }

        function formatarMoeda(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
        
        function renderizarCards(lista) {
            const container = document.getElementById("listaDespesas");
            container.innerHTML = lista.length ? "" : "<p style='color:#888;text-align:center;padding:20px;'>Nenhuma despesa localizada.</p>";
            
            lista.sort((a, b) => new Date(a.data) - new Date(b.data));

            lista.forEach(d => {
                let cor = d.status === 'Pago' ? '#22c1a6' : (d.status === 'Atrasado' ? '#ff4d4d' : '#FFDF73');

                container.innerHTML += `
                    <div class="expense-card">
                        <div class="expense-info">
                            <h4>${d.descricao}</h4>
                            <p style="font-size: 0.7rem; color: #888; margin-top: 3px;">${d.data.split('-').reverse().join('/')} • ${d.macrogrupo || 'N/A'} > ${d.grupo || 'N/A'} > ${d.categoria || 'N/A'}</p>
                        </div>
                        <div class="expense-value">
                            <span class="price">${formatarMoeda(d.valor)}</span>
                            <span class="status" style="background:${cor}; color:#111; font-weight:bold;">${d.status}</span>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
